name: ynab-receipt-analyzer

x-backend-common: &backend-common
  build:
    context: .
    dockerfile: docker/backend.Dockerfile
  env_file:
    - .env
  environment:
    DATABASE_URL: sqlite:///./data/app.db
    REDIS_URL: redis://redis:6379/0
    INGEST_DIR: ./data/ingest
    OBJECT_STORE_ROOT: ./data
    OBJECT_STORE_RECEIPTS_PREFIX: receipts
    LOG_FILE_PATH: ./data/logs/app.log
    CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
  volumes:
    - app_data:/app/data
  networks:
    - app
  restart: unless-stopped
  init: true

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  migrate:
    <<: *backend-common
    command: ["alembic", "-c", "backend/alembic.ini", "upgrade", "head"]
    depends_on:
      redis:
        condition: service_started
    restart: "no"
    profiles:
      - ops

  api:
    <<: *backend-common
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    <<: *backend-common
    command: ["python", "worker/worker.py"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  scanner:
    <<: *backend-common
    command: ["python", "worker/scanner.py"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        INTERNAL_API_ORIGIN: http://api:8000
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      INTERNAL_API_ORIGIN: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - app
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  app:
    driver: bridge

volumes:
  app_data:
  redis_data:
